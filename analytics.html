<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Dairy Analytics</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<div class="logo">

<img src="assets/logo.png" width="70">

<div>

<h2>Daily Dairy</h2>

<p>Analytics Dashboard</p>

</div>

</div>

<div class="dealer">

<h2>Administrator</h2>

<p>Business Analytics</p>

</div>

</header>

<h1 class="dashboard-title">

📈 Business Analytics

</h1>

<div class="summary">

<div class="summary-card blue">

<h2 id="totalSubmissions">0</h2>

<p>Total Submissions</p>

</div>

<div class="summary-card green">

<h2 id="activeDealers">0</h2>

<p>Active Dealers</p>

</div>

<div class="summary-card orange">

<h2 id="criticalProducts">0</h2>

<p>Critical Products</p>

</div>

<div class="summary-card red">

<h2 id="inventoryHealth">0%</h2>

<p>Inventory Health</p>

</div>

</div>

<div class="dashboard-grid">

<div>

<div class="section">

<h2>🚨 Critical Products</h2>

<div id="criticalList">

Loading...

</div>

</div>

<div class="section">

<h2>📋 Recent Submissions</h2>

<div id="recentList">

Loading...

</div>

</div>

</div>

<div>

<div class="section">

<h2>🏪 Dealer Performance</h2>

<table style="width:100%;border-collapse:collapse;">

<thead>

<tr>

<th align="left">Dealer</th>

<th align="center">Products</th>

<th align="right">Health</th>

</tr>

</thead>

<tbody id="dealerTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="js/firebase.js"></script>

<script src="js/analytics.js"></script>

</body>

</html>
